version: '3.8'

services:
  app:
    image: node:20-bookworm
    volumes:
      - .:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: interview
      DB_NAME: shopdb
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: interview
      MYSQL_DATABASE: shopdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pinterview"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
